<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Pink Welcome</title>
    <style>
        :root {
            --hot-pink: #ff007f;
            --deep-fuchsia: #d4006a;
            --neon-glow: rgba(255, 0, 127, 0.3);
            --dark-bg: #1a1a1a; /* Dark background makes hot pink pop more */
        }

        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background: radial-gradient(circle, #ff007f 0%, #800040 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            border: 4px solid var(--hot-pink);
        }

        h1 {
            color: var(--hot-pink);
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-top: 0;
            font-size: 2.5rem;
            text-shadow: 2px 2px 0px #eee;
        }

        .input-box {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            color: var(--deep-fuchsia);
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffb3d9;
            border-radius: 50px; /* Extra rounded for that "pop" look */
            box-sizing: border-box;
            outline: none;
            font-weight: bold;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--hot-pink);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--hot-pink);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px var(--neon-glow);
            margin-top: 20px;
            transition: transform 0.2s, background 0.2s;
        }

        .main-btn:hover {
            background-color: var(--deep-fuchsia);
            transform: scale(1.02);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .footer-links a {
            color: var(--hot-pink);
            text-decoration: none;
            border-bottom: 2px solid transparent;
        }

        .footer-links a:hover {
            border-bottom: 2px solid var(--hot-pink);
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Hey Welcome</h1>
    
    <form>
        <div class="input-box">
            <label>Name</label>
            <input type="text" placeholder="Your Name" required>
        </div>

        <div class="input-box">
            <label>Email or Phone</label>
            <input type="text" placeholder="hello@pink.com" required>
        </div>

        <div class="grid-row">
            <div class="input-box">
                <label>Age</label>
                <input type="number" placeholder="18">
            </div>
            <div class="input-box">
                <label>Gender</label>
                <select>
                    <option>Female</option>
                    <option>Male</option>
                    <option>Non-binary</option>
                </select>
            </div>
        </div>

        <div class="input-box">
            <label>Create Password</label>
            <input type="password" placeholder="••••••••">
        </div>

        <button type="submit" class="main-btn">Sign Up</button>

        <div class="footer-links">
            Already a member? <a href="#">Sign In</a>
        </div>
    </form>
</div>

</body>
</html>
